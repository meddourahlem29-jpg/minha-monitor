name: Monitor ANEM

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check website
        run: |
          curl -L -s https://minha.anem.dz/change_rendez_vous > page.html

          if grep -q "لا توجد مواعيد" page.html; then
            echo "No appointments yet."
          else
            curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
              -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -d text="🚨 قد تكون مواعيد منحة البطالة قد فُتحت! تحقق من الموقع: https://minha.anem.dz/change_rendez_vous"
          fi
